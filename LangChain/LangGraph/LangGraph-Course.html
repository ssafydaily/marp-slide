<header>About this course</header>

<h2 id="%EC%9D%B4-%EA%B0%95%EC%9D%98%EC%97%90%EC%84%9C-%EB%B0%B0%EC%9A%B0%EB%8A%94-%EA%B2%83">이 강의에서 배우는 것</h2>
<ul>
<li><strong>그래프로 사고하기</strong> — 체인을 넘어 상태(state)·분기·순환이 있는 흐름 설계</li>
<li><strong>에이전트 직접 구현</strong> — Tool calling과 ReAct 루프를 밑바닥부터</li>
<li><strong>기억하는 시스템</strong> — Checkpointer로 대화·상태를 영속화(persist)</li>
<li><strong>사람과 협업</strong> — Human-in-the-loop 승인 게이트</li>
<li><strong>실전 아키텍처</strong> — RAG, 그리고 멀티 에이전트 협업 시스템</li>
</ul>
<blockquote>
<p><strong>사전 지식</strong>: Python 함수 · 타입 힌트 · 딕셔너리에 익숙하면 충분합니다. LangChain 경험은 필요 없습니다.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>

</div>
<div>
<h4 id="%ED%99%98%EA%B2%BD-%EB%B3%80%EC%88%98">환경 변수</h4>

<header>Why a graph?</header>

<h2 id="langchain-vs-langgraph">LangChain vs LangGraph</h2>
<table>
<thead>
<tr>
<th>구분</th>
<th>LangChain 체인</th>
<th>LangGraph</th>
</tr>
</thead>
<tbody>
<tr>
<td>흐름</td>
<td>대체로 <strong>일방향</strong> (A→B→C)</td>
<td><strong>그래프</strong> — 분기·순환 가능</td>
</tr>
<tr>
<td>상태</td>
<td>단계 간 암묵적 전달</td>
<td><strong>명시적 State</strong> 객체</td>
</tr>
<tr>
<td>반복</td>
<td>직접 루프 작성</td>
<td>엣지로 자연스럽게 cycle</td>
</tr>
<tr>
<td>제어</td>
<td>중간 개입 어려움</td>
<td><strong>interrupt</strong>로 일시정지·재개</td>
</tr>
<tr>
<td>적합</td>
<td>단순 파이프라인</td>
<td><strong>에이전트 · 다단계 워크플로</strong></td>
</tr>
</tbody>
</table>
<blockquote>
<p>LangGraph는 LangChain을 <strong>대체</strong>하지 않습니다. LangChain의 모델·툴·메시지를 그대로 쓰되, <strong>실행 흐름</strong>을 그래프로 다룹니다.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Why a graph?" data-theme="blueprint" lang="en-US" data-marpit-pagination="6" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Why a graph?;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Why a graph?</header>

<h2 id="%EC%B2%B4%EC%9D%B8%EC%9D%98-%ED%95%9C%EA%B3%84-%EA%B7%B8%EB%9E%98%ED%94%84%EC%9D%98-%EC%9E%90%EC%9C%A0">체인의 한계, 그래프의 자유</h2>
<div class="mermaid">
flowchart LR
  subgraph CHAIN["체인 · 한 번 지나가면 끝"]
    a1([입력]) --&gt; b1[LLM] --&gt; c1([출력])
  end
</div>
<div class="mermaid">
flowchart LR
  subgraph GRAPH["그래프 · 판단하고 되돌아옴"]
    s([START]) --&gt; ag[agent]
    ag --&gt;|도구 필요| tl[tools]
    tl --&gt; ag
    ag --&gt;|완료| e([END])
  end
</div>
<blockquote>
<p>&quot;더 검색할까? 다시 시도할까? 사람에게 물어볼까?&quot; — 이런 <strong>판단과 반복</strong>이 필요한 순간이 LangGraph가 빛나는 지점입니다.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-footer="LangGraph 풀코스 · v1.x" data-class="section" data-theme="blueprint" lang="en-US" class="section" style="--footer:LangGraph 풀코스 · v1.x;--class:section;--theme:blueprint;"><div class="modnum">MODULE 01</div>
<h1 id="%ED%95%B5%EC%8B%AC-%EA%B5%AC%EC%84%B1%EC%9A%94%EC%86%8C">핵심 구성요소</h1>
<div class="modsub">State · Node · Edge · Graph</div>
<footer>LangGraph 풀코스 · v1.x</footer>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 01 · The big picture" data-theme="blueprint" lang="en-US" data-marpit-pagination="8" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 01 · The big picture;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 01 · The big picture</header>

<h2 id="%EA%B7%B8%EB%9E%98%ED%94%84%EB%A5%BC-%EC%9D%B4%EB%A3%A8%EB%8A%94-%EB%84%A4-%EA%B0%80%EC%A7%80">그래프를 이루는 네 가지</h2>
<div class="mermaid">
flowchart LR
  S([START]) --&gt;|State| N1[node A] --&gt;|State| N2[node B] --&gt;|State| E([END])
</div>
<ul>
<li><strong>State</strong> — 그래프 전체가 공유하는 데이터(딕셔너리). 매 노드를 거치며 갱신</li>
<li><strong>Node</strong> — State를 입력받아 <strong>갱신분(diff)</strong> 을 돌려주는 함수</li>
<li><strong>Edge</strong> — 노드와 노드를 잇는 흐름. 고정 엣지와 조건부 엣지</li>
<li><strong>Graph</strong> — 위를 조립해 <code>compile()</code> 한 실행 가능한 객체</li>
</ul>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 01 · State" data-theme="blueprint" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 01 · State;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 01 · State</header>

<h2 id="state--%EA%B7%B8%EB%9E%98%ED%94%84%EC%9D%98-%EA%B3%B5%EC%9C%A0-%EB%A9%94%EB%AA%A8%EB%A6%AC">State — 그래프의 공유 메모리</h2>
<pre><code class="language-python"><span class="hljs-keyword">from</span> typing <span class="hljs-keyword">import</span> TypedDict, Annotated
<span class="hljs-keyword">from</span> langchain_core.messages <span class="hljs-keyword">import</span> AnyMessage
<span class="hljs-keyword">from</span> langgraph.graph.message <span class="hljs-keyword">import</span> add_messages

<span class="hljs-keyword">class</span> <span class="hljs-title class_">State</span>(<span class="hljs-title class_ inherited__">TypedDict</span>):
    <span class="hljs-comment"># 일반 필드는 노드가 반환하면 &quot;덮어쓰기&quot;가 기본</span>
    topic: <span class="hljs-built_in">str</span>
    <span class="hljs-comment"># Annotated + reducer 를 주면 &quot;병합&quot; 규칙을 지정할 수 있다</span>
    messages: Annotated[<span class="hljs-built_in">list</span>[AnyMessage], add_messages]
</code></pre>
<ul>
<li>State는 보통 <code>TypedDict</code> (또는 Pydantic / dataclass)</li>
<li>노드는 State 전체가 아니라 <strong>바꿀 필드만</strong> 반환한다</li>
</ul>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 01 · Reducers" data-theme="blueprint" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 01 · Reducers;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 01 · Reducers</header>

<h2 id="reducer--%EC%83%81%ED%83%9C%EB%A5%BC-%EC%96%B4%EB%96%BB%EA%B2%8C-%ED%95%A9%EC%B9%A0%EA%B9%8C">Reducer — 상태를 어떻게 합칠까</h2>
<div class="cols">
<div>
<p>기본값은 <strong>덮어쓰기</strong>. reducer를 지정하면 <strong>누적/병합</strong> 규칙이 된다.</p>
<pre><code class="language-python"><span class="hljs-keyword">from</span> operator <span class="hljs-keyword">import</span> add
<span class="hljs-keyword">from</span> typing <span class="hljs-keyword">import</span> Annotated

<span class="hljs-keyword">class</span> <span class="hljs-title class_">State</span>(<span class="hljs-title class_ inherited__">TypedDict</span>):
    <span class="hljs-comment"># 리스트를 이어붙임 [a] + [b] = [a, b]</span>
    logs: Annotated[<span class="hljs-built_in">list</span>[<span class="hljs-built_in">str</span>], add]
</code></pre>
</div>
<div>
<p><code>add_messages</code>는 메시지 전용 reducer:</p>
<pre><code class="language-python"><span class="hljs-comment"># 같은 id 면 교체, 새 id 면 추가.</span>
<span class="hljs-comment"># (&quot;user&quot;, &quot;..&quot;) 같은 튜플도 자동 변환</span>
messages: Annotated[<span class="hljs-built_in">list</span>, add_messages]
</code></pre>
<blockquote>
<p>대부분의 챗봇은 이 패턴 하나로 충분합니다.</p>
</blockquote>
</div>
</div>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 01 · MessagesState" data-theme="blueprint" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 01 · MessagesState;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 01 · MessagesState</header>

<h2 id="messagesstate--%EA%B0%80%EC%9E%A5-%ED%9D%94%ED%95%9C-%EC%A7%80%EB%A6%84%EA%B8%B8">MessagesState — 가장 흔한 지름길</h2>
<pre><code class="language-python"><span class="hljs-keyword">from</span> langgraph.graph <span class="hljs-keyword">import</span> MessagesState

<span class="hljs-comment"># 아래 정의를 미리 만들어 둔 것과 동일하다:</span>
<span class="hljs-comment">#   class MessagesState(TypedDict):</span>
<span class="hljs-comment">#       messages: Annotated[list[AnyMessage], add_messages]</span>

<span class="hljs-keyword">class</span> <span class="hljs-title class_">State</span>(<span class="hljs-title class_ inherited__">MessagesState</span>):
    <span class="hljs-comment"># 필요하면 필드를 더 얹는다</span>
    user_id: <span class="hljs-built_in">str</span>
</code></pre>
<blockquote>
<p>채팅 기반 그래프라면 <code>MessagesState</code>로 시작하세요. 직접 <code>TypedDict</code>를 쓰는 건 메시지 외 상태가 필요할 때입니다.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 01 · Node" data-theme="blueprint" lang="en-US" data-marpit-pagination="12" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 01 · Node;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 01 · Node</header>

<h2 id="node--%EC%83%81%ED%83%9C%EB%A5%BC-%EA%B0%B1%EC%8B%A0%ED%95%98%EB%8A%94-%ED%95%A8%EC%88%98">Node — 상태를 갱신하는 함수</h2>
<pre><code class="language-python"><span class="hljs-keyword">from</span> langchain.chat_models <span class="hljs-keyword">import</span> init_chat_model

llm = init_chat_model(<span class="hljs-string">&quot;openai:gpt-4o&quot;</span>)

<span class="hljs-keyword">def</span> <span class="hljs-title function_">chatbot</span>(<span class="hljs-params">state: MessagesState</span>) -&gt; <span class="hljs-built_in">dict</span>:
    <span class="hljs-comment"># state[&quot;messages&quot;] 를 읽고</span>
    response = llm.invoke(state[<span class="hljs-string">&quot;messages&quot;</span>])
    <span class="hljs-comment"># 바뀐 부분만 dict 로 반환 → add_messages 가 누적해 준다</span>
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;messages&quot;</span>: [response]}
</code></pre>
<ul>
<li>노드는 그냥 <strong>함수</strong>다 (또는 callable). 입력 <code>state</code>, 출력 <code>dict</code></li>
<li>반환한 dict가 State에 <strong>병합</strong>된다 (reducer 규칙대로)</li>
</ul>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 01 · Edge &amp; build" data-theme="blueprint" lang="en-US" data-marpit-pagination="13" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 01 · Edge &amp; build;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 01 · Edge &amp; build</header>

<h2 id="edge--%ED%9D%90%EB%A6%84%EC%9D%84-%EC%97%B0%EA%B2%B0%ED%95%98%EA%B3%A0-%EC%BB%B4%ED%8C%8C%EC%9D%BC">Edge — 흐름을 연결하고 컴파일</h2>
<pre><code class="language-python"><span class="hljs-keyword">from</span> langgraph.graph <span class="hljs-keyword">import</span> StateGraph, START, END

builder = StateGraph(MessagesState)
builder.add_node(<span class="hljs-string">&quot;chatbot&quot;</span>, chatbot)

builder.add_edge(START, <span class="hljs-string">&quot;chatbot&quot;</span>)   <span class="hljs-comment"># 진입점</span>
builder.add_edge(<span class="hljs-string">&quot;chatbot&quot;</span>, END)     <span class="hljs-comment"># 종료점</span>

graph = builder.<span class="hljs-built_in">compile</span>()
</code></pre>
<ul>
<li><code>START</code> / <code>END</code>는 그래프의 가상 진입·종료 노드</li>
<li><code>compile()</code> 결과는 LangChain <strong>Runnable</strong> — <code>invoke</code>, <code>stream</code> 사용 가능</li>
</ul>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 01 · Run it" data-theme="blueprint" lang="en-US" data-marpit-pagination="14" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 01 · Run it;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 01 · Run it</header>

<h2 id="%EC%8B%A4%ED%96%89--invoke-%EC%99%80-stream">실행 — invoke 와 stream</h2>
<div class="cols">
<div>
<h4 id="%ED%95%9C-%EB%B2%88%EC%97%90-invoke">한 번에 (invoke)</h4>
<pre><code class="language-python">out = graph.invoke({
  <span class="hljs-string">&quot;messages&quot;</span>: [
    {<span class="hljs-string">&quot;role&quot;</span>: <span class="hljs-string">&quot;user&quot;</span>, <span class="hljs-string">&quot;content&quot;</span>: <span class="hljs-string">&quot;안녕!&quot;</span>}
  ]
})
<span class="hljs-built_in">print</span>(out[<span class="hljs-string">&quot;messages&quot;</span>][-<span class="hljs-number">1</span>].content)
</code></pre>
</div>
<div>
<h4 id="%ED%9D%98%EB%A0%A4%EB%B3%B4%EB%A9%B0-stream">흘려보며 (stream)</h4>
<pre><code class="language-python"><span class="hljs-keyword">for</span> chunk <span class="hljs-keyword">in</span> graph.stream(
    {<span class="hljs-string">&quot;messages&quot;</span>: [(<span class="hljs-string">&quot;user&quot;</span>, <span class="hljs-string">&quot;안녕!&quot;</span>)]},
    stream_mode=<span class="hljs-string">&quot;values&quot;</span>,
):
    chunk[<span class="hljs-string">&quot;messages&quot;</span>][-<span class="hljs-number">1</span>].pretty_print()
</code></pre>
</div>
</div>
<blockquote>
<p><code>stream_mode</code>는 모듈 09에서 자세히 — <code>values</code> / <code>updates</code> / <code>messages</code>.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 01 · Lab" data-theme="blueprint" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 01 · Lab;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 01 · Lab</header>

<h2 id="span-classlab%EC%8B%A4%EC%8A%B5-01span-%EC%97%90%EC%BD%94-%EC%B1%97%EB%B4%87%EC%9D%84-%EA%B7%B8%EB%9E%98%ED%94%84%EB%A1%9C"><span class="lab">실습 01</span> 에코 챗봇을 그래프로</h2>
<div class="cols">
<div>
<pre><code class="language-python"><span class="hljs-keyword">from</span> langgraph.graph <span class="hljs-keyword">import</span> (
    StateGraph, START, END, MessagesState)
<span class="hljs-keyword">from</span> langchain.chat_models <span class="hljs-keyword">import</span> init_chat_model

llm = init_chat_model(<span class="hljs-string">&quot;openai:gpt-4o&quot;</span>)

<span class="hljs-keyword">def</span> <span class="hljs-title function_">chatbot</span>(<span class="hljs-params">state: MessagesState</span>):
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;messages&quot;</span>: [llm.invoke(state[<span class="hljs-string">&quot;messages&quot;</span>])]}

g = StateGraph(MessagesState)
g.add_node(<span class="hljs-string">&quot;chatbot&quot;</span>, chatbot)
g.add_edge(START, <span class="hljs-string">&quot;chatbot&quot;</span>)
g.add_edge(<span class="hljs-string">&quot;chatbot&quot;</span>, END)
graph = g.<span class="hljs-built_in">compile</span>()
</code></pre>
</div>
<div>
<h4 id="%ED%95%B4%EB%B3%B4%EA%B8%B0">해보기</h4>
<ol>
<li><code>graph.invoke</code> 로 한 번 대화</li>
<li><code>stream_mode=&quot;values&quot;</code> 로 바꿔 출력</li>
<li>노드를 하나 더 추가해 보기 (예: 입력 전처리 노드)</li>
</ol>
<blockquote>
<p>아직 <strong>기억은 못 합니다</strong>. 매 호출이 백지 — 모듈 05에서 해결합니다.</p>
</blockquote>
</div>
</div>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-footer="LangGraph 풀코스 · v1.x" data-class="section" data-theme="blueprint" lang="en-US" class="section" style="--footer:LangGraph 풀코스 · v1.x;--class:section;--theme:blueprint;"><div class="modnum">MODULE 02</div>
<h1 id="%EC%A1%B0%EA%B1%B4%EB%B6%80-%EB%B6%84%EA%B8%B0">조건부 분기</h1>
<div class="modsub">Conditional Edges · Command</div>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 02 · Branching" data-theme="blueprint" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 02 · Branching;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 02 · Branching</header>

<h2 id="%ED%9D%90%EB%A6%84%EC%9D%84-%EB%82%98%EB%88%84%EB%8A%94-%EB%91%90-%EA%B0%80%EC%A7%80-%EB%B0%A9%EB%B2%95">흐름을 나누는 두 가지 방법</h2>
<div class="mermaid">
flowchart LR
  C[classifier] --&gt;|order| O[order_node]
  C --&gt;|chat| H[chat_node]
  O --&gt; E([END])
  H --&gt; E([END])
</div>
<ul>
<li><strong>고정 엣지</strong> <code>add_edge(a, b)</code> — 항상 a 다음 b</li>
<li><strong>조건부 엣지</strong> <code>add_conditional_edges(a, router)</code> — <strong>router 함수</strong>의 반환값으로 다음 노드를 결정</li>
</ul>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 02 · Router function" data-theme="blueprint" lang="en-US" data-marpit-pagination="18" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 02 · Router function;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 02 · Router function</header>

<h2 id="%EB%9D%BC%EC%9A%B0%ED%8C%85-%ED%95%A8%EC%88%98--%EB%8B%A4%EC%9D%8C-%EB%85%B8%EB%93%9C%EB%A5%BC-%EA%B3%A0%EB%A5%B8%EB%8B%A4">라우팅 함수 — 다음 노드를 고른다</h2>
<pre><code class="language-python"><span class="hljs-keyword">from</span> typing <span class="hljs-keyword">import</span> <span class="hljs-type">Literal</span>

<span class="hljs-keyword">def</span> <span class="hljs-title function_">route</span>(<span class="hljs-params">state: State</span>) -&gt; <span class="hljs-type">Literal</span>[<span class="hljs-string">&quot;order&quot;</span>, <span class="hljs-string">&quot;chat&quot;</span>]:
    text = state[<span class="hljs-string">&quot;messages&quot;</span>][-<span class="hljs-number">1</span>].content
    <span class="hljs-keyword">if</span> <span class="hljs-string">&quot;주문&quot;</span> <span class="hljs-keyword">in</span> text <span class="hljs-keyword">or</span> <span class="hljs-string">&quot;배송&quot;</span> <span class="hljs-keyword">in</span> text:
        <span class="hljs-keyword">return</span> <span class="hljs-string">&quot;order&quot;</span>
    <span class="hljs-keyword">return</span> <span class="hljs-string">&quot;chat&quot;</span>

builder.add_conditional_edges(
    <span class="hljs-string">&quot;classifier&quot;</span>,          <span class="hljs-comment"># 이 노드 다음에</span>
    route,                 <span class="hljs-comment"># 이 함수가 반환하는 키로 분기</span>
    {<span class="hljs-string">&quot;order&quot;</span>: <span class="hljs-string">&quot;order_node&quot;</span>, <span class="hljs-string">&quot;chat&quot;</span>: <span class="hljs-string">&quot;chat_node&quot;</span>},  <span class="hljs-comment"># 키 → 노드 매핑</span>
)
</code></pre>
<blockquote>
<p>매핑 dict를 생략하면 <strong>반환 문자열 = 노드 이름</strong>으로 간주합니다.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 02 · Lab" data-theme="blueprint" lang="en-US" data-marpit-pagination="19" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 02 · Lab;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 02 · Lab</header>

<h2 id="span-classlab%EC%8B%A4%EC%8A%B5-02span-%EC%9D%98%EB%8F%84-%EB%B6%84%EB%A5%98-%EB%9D%BC%EC%9A%B0%ED%84%B0"><span class="lab">실습 02</span> 의도 분류 라우터</h2>
<div class="cols">
<div>
<pre><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">classify</span>(<span class="hljs-params">state: State</span>):
    msg = state[<span class="hljs-string">&quot;messages&quot;</span>][-<span class="hljs-number">1</span>].content
    prompt = <span class="hljs-string">f&quot;다음을 order/chat 로만 답하라: <span class="hljs-subst">{msg}</span>&quot;</span>
    label = llm.invoke(prompt).content.strip()
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;intent&quot;</span>: label}

<span class="hljs-keyword">def</span> <span class="hljs-title function_">route</span>(<span class="hljs-params">state</span>) -&gt; <span class="hljs-type">Literal</span>[<span class="hljs-string">&quot;order&quot;</span>, <span class="hljs-string">&quot;chat&quot;</span>]:
    <span class="hljs-keyword">return</span> <span class="hljs-string">&quot;order&quot;</span> <span class="hljs-keyword">if</span> <span class="hljs-string">&quot;order&quot;</span> <span class="hljs-keyword">in</span> state[<span class="hljs-string">&quot;intent&quot;</span>] <span class="hljs-keyword">else</span> <span class="hljs-string">&quot;chat&quot;</span>
</code></pre>
</div>
<div>
<pre><code class="language-python">g.add_node(<span class="hljs-string">&quot;classify&quot;</span>, classify)
g.add_node(<span class="hljs-string">&quot;order_node&quot;</span>, handle_order)
g.add_node(<span class="hljs-string">&quot;chat_node&quot;</span>, handle_chat)

g.add_edge(START, <span class="hljs-string">&quot;classify&quot;</span>)
g.add_conditional_edges(<span class="hljs-string">&quot;classify&quot;</span>, route,
    {<span class="hljs-string">&quot;order&quot;</span>: <span class="hljs-string">&quot;order_node&quot;</span>, <span class="hljs-string">&quot;chat&quot;</span>: <span class="hljs-string">&quot;chat_node&quot;</span>})
g.add_edge(<span class="hljs-string">&quot;order_node&quot;</span>, END)
g.add_edge(<span class="hljs-string">&quot;chat_node&quot;</span>, END)
</code></pre>
</div>
</div>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 02 · Command" data-theme="blueprint" lang="en-US" data-marpit-pagination="20" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 02 · Command;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 02 · Command</header>

<h2 id="command--%EA%B0%B1%EC%8B%A0%EA%B3%BC-%EC%9D%B4%EB%8F%99%EC%9D%84-%ED%95%9C-%EB%B2%88%EC%97%90">Command — 갱신과 이동을 한 번에</h2>
<p><code>Command</code>를 반환하면 노드가 <strong>상태 갱신</strong>과 <strong>다음 노드 지정</strong>을 동시에 할 수 있다. 라우터 노드를 따로 둘 필요가 없어진다.</p>
<pre><code class="language-python"><span class="hljs-keyword">from</span> langgraph.types <span class="hljs-keyword">import</span> Command
<span class="hljs-keyword">from</span> typing <span class="hljs-keyword">import</span> <span class="hljs-type">Literal</span>

<span class="hljs-keyword">def</span> <span class="hljs-title function_">classifier</span>(<span class="hljs-params">state: State</span>) -&gt; Command[<span class="hljs-type">Literal</span>[<span class="hljs-string">&quot;order_node&quot;</span>, <span class="hljs-string">&quot;chat_node&quot;</span>]]:
    text = state[<span class="hljs-string">&quot;messages&quot;</span>][-<span class="hljs-number">1</span>].content
    target = <span class="hljs-string">&quot;order_node&quot;</span> <span class="hljs-keyword">if</span> <span class="hljs-string">&quot;주문&quot;</span> <span class="hljs-keyword">in</span> text <span class="hljs-keyword">else</span> <span class="hljs-string">&quot;chat_node&quot;</span>
    <span class="hljs-keyword">return</span> Command(
        update={<span class="hljs-string">&quot;intent&quot;</span>: target},   <span class="hljs-comment"># 상태 갱신</span>
        goto=target,                 <span class="hljs-comment"># 다음 노드로 이동</span>
    )
</code></pre>
<blockquote>
<p>멀티 에이전트의 <strong>handoff</strong>(제어 넘김)가 바로 이 <code>Command(goto=...)</code> 위에 세워집니다 — 모듈 08.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-footer="LangGraph 풀코스 · v1.x" data-class="section" data-theme="blueprint" lang="en-US" class="section" style="--footer:LangGraph 풀코스 · v1.x;--class:section;--theme:blueprint;"><div class="modnum">MODULE 03</div>
<h1 id="%EC%88%9C%ED%99%98%EA%B3%BC-%EB%B0%98%EB%B3%B5">순환과 반복</h1>
<div class="modsub">Cycles · Loops · recursion_limit</div>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 03 · Why cycles" data-theme="blueprint" lang="en-US" data-marpit-pagination="22" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 03 · Why cycles;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 03 · Why cycles</header>

<h2 id="%EC%82%AC%EC%9D%B4%ED%81%B4--%EA%B7%B8%EB%9E%98%ED%94%84%EC%9D%98-%EC%A7%84%EC%A7%9C-%ED%9E%98">사이클 — 그래프의 진짜 힘</h2>
<div class="mermaid">
flowchart LR
  D[draft] --&gt; CR[critic]
  CR --&gt;|점수 낮음| RV[reviser]
  RV --&gt; CR
  CR --&gt;|충분함| E([END])
</div>
<ul>
<li>일반 DAG와 달리 LangGraph는 <strong>노드로 되돌아오는 엣지</strong>를 허용</li>
<li>&quot;조건을 만족할 때까지 반복&quot; — 에이전트·자기수정 루프의 토대</li>
<li>되돌아가는 길은 보통 <strong>조건부 엣지</strong>로 만든다</li>
</ul>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 03 · Build a loop" data-theme="blueprint" lang="en-US" data-marpit-pagination="23" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 03 · Build a loop;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 03 · Build a loop</header>

<h2 id="%EB%A3%A8%ED%94%84-%EB%A7%8C%EB%93%A4%EA%B8%B0--%EB%90%98%EB%8F%8C%EB%A6%AC%EB%8A%94-%EC%97%A3%EC%A7%80">루프 만들기 — 되돌리는 엣지</h2>
<pre><code class="language-python"><span class="hljs-keyword">from</span> typing <span class="hljs-keyword">import</span> <span class="hljs-type">Literal</span>

<span class="hljs-keyword">def</span> <span class="hljs-title function_">should_continue</span>(<span class="hljs-params">state: State</span>) -&gt; <span class="hljs-type">Literal</span>[<span class="hljs-string">&quot;reviser&quot;</span>, <span class="hljs-string">&quot;__end__&quot;</span>]:
    <span class="hljs-keyword">if</span> state[<span class="hljs-string">&quot;score&quot;</span>] &gt;= <span class="hljs-number">0.8</span> <span class="hljs-keyword">or</span> state[<span class="hljs-string">&quot;iterations&quot;</span>] &gt;= <span class="hljs-number">3</span>:
        <span class="hljs-keyword">return</span> <span class="hljs-string">&quot;__end__&quot;</span>          <span class="hljs-comment"># END 의 예약 키</span>
    <span class="hljs-keyword">return</span> <span class="hljs-string">&quot;reviser&quot;</span>

builder.add_node(<span class="hljs-string">&quot;critic&quot;</span>, critic)
builder.add_node(<span class="hljs-string">&quot;reviser&quot;</span>, reviser)

builder.add_conditional_edges(<span class="hljs-string">&quot;critic&quot;</span>, should_continue)
builder.add_edge(<span class="hljs-string">&quot;reviser&quot;</span>, <span class="hljs-string">&quot;critic&quot;</span>)   <span class="hljs-comment"># 다시 평가하러 돌아감</span>
</code></pre>
<blockquote>
<p><code>&quot;__end__&quot;</code> 는 <code>END</code>를 가리키는 문자열 키. 매핑 없이 쓸 때 편리합니다.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 03 · Safety" data-theme="blueprint" lang="en-US" data-marpit-pagination="24" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 03 · Safety;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 03 · Safety</header>

<h2 id="%EB%AC%B4%ED%95%9C-%EB%A3%A8%ED%94%84-%EB%B0%A9%EC%96%B4--recursion_limit">무한 루프 방어 — recursion_limit</h2>
<pre><code class="language-python"><span class="hljs-comment"># 한 번의 실행에서 거칠 수 있는 &quot;슈퍼스텝&quot; 상한</span>
graph.invoke(inputs, config={<span class="hljs-string">&quot;recursion_limit&quot;</span>: <span class="hljs-number">10</span>})
</code></pre>
<ul>
<li>기본값은 <strong>25</strong>. 넘으면 <code>GraphRecursionError</code> 발생</li>
<li>루프에는 항상 <strong>종료 조건 두 개</strong>를 두자:
<ul>
<li>품질 조건 (예: <code>score &gt;= 0.8</code>)</li>
<li>횟수 조건 (예: <code>iterations &gt;= 3</code>)</li>
</ul>
</li>
<li>카운터는 State에 두고 노드에서 <code>+1</code> 갱신</li>
</ul>
<blockquote>
<p>&quot;수렴하지 않으면 멈춘다&quot; — 안전한 루프의 기본기.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 03 · Lab" data-theme="blueprint" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 03 · Lab;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 03 · Lab</header>

<h2 id="span-classlab%EC%8B%A4%EC%8A%B5-03span-%EB%B0%98%EB%B3%B5-%EC%A0%95%EC%A0%9C-%EB%A3%A8%ED%94%84"><span class="lab">실습 03</span> 반복 정제 루프</h2>
<div class="cols">
<div>
<pre><code class="language-python"><span class="hljs-keyword">class</span> <span class="hljs-title class_">State</span>(<span class="hljs-title class_ inherited__">TypedDict</span>):
    task: <span class="hljs-built_in">str</span>
    draft: <span class="hljs-built_in">str</span>
    score: <span class="hljs-built_in">float</span>
    iterations: <span class="hljs-built_in">int</span>

<span class="hljs-keyword">def</span> <span class="hljs-title function_">reviser</span>(<span class="hljs-params">state</span>):
    new = llm.invoke(
        <span class="hljs-string">f&quot;개선하라:\n<span class="hljs-subst">{state[<span class="hljs-string">&#x27;draft&#x27;</span>]}</span>&quot;</span>).content
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;draft&quot;</span>: new,
            <span class="hljs-string">&quot;iterations&quot;</span>: state[<span class="hljs-string">&quot;iterations&quot;</span>] + <span class="hljs-number">1</span>}
</code></pre>
</div>
<div>
<pre><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">critic</span>(<span class="hljs-params">state</span>):
    s = grade(state[<span class="hljs-string">&quot;draft&quot;</span>])   <span class="hljs-comment"># 0~1</span>
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;score&quot;</span>: s}

<span class="hljs-keyword">def</span> <span class="hljs-title function_">keep_going</span>(<span class="hljs-params">state</span>) -&gt; <span class="hljs-type">Literal</span>[<span class="hljs-string">&quot;reviser&quot;</span>,<span class="hljs-string">&quot;__end__&quot;</span>]:
    <span class="hljs-keyword">if</span> state[<span class="hljs-string">&quot;score&quot;</span>] &gt;= <span class="hljs-number">0.8</span> <span class="hljs-keyword">or</span> \
       state[<span class="hljs-string">&quot;iterations&quot;</span>] &gt;= <span class="hljs-number">3</span>:
        <span class="hljs-keyword">return</span> <span class="hljs-string">&quot;__end__&quot;</span>
    <span class="hljs-keyword">return</span> <span class="hljs-string">&quot;reviser&quot;</span>
</code></pre>
<blockquote>
<p>초안 → 평가 → (부족하면) 수정 → 다시 평가. 자기수정 에이전트의 축소판.</p>
</blockquote>
</div>
</div>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-footer="LangGraph 풀코스 · v1.x" data-class="section" data-theme="blueprint" lang="en-US" class="section" style="--footer:LangGraph 풀코스 · v1.x;--class:section;--theme:blueprint;"><div class="modnum">MODULE 04</div>
<h1 id="%EB%8F%84%EA%B5%AC%EC%99%80-%EC%97%90%EC%9D%B4%EC%A0%84%ED%8A%B8">도구와 에이전트</h1>
<div class="modsub">Tool calling · ToolNode · ReAct</div>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 04 · Tools" data-theme="blueprint" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 04 · Tools;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 04 · Tools</header>

<h2 id="%EB%8F%84%EA%B5%AC-%EC%A0%95%EC%9D%98--tool">도구 정의 — @tool</h2>
<pre><code class="language-python"><span class="hljs-keyword">from</span> langchain_core.tools <span class="hljs-keyword">import</span> tool

<span class="hljs-meta">@tool</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">search</span>(<span class="hljs-params">query: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;웹에서 query 를 검색해 결과 요약을 반환한다.&quot;&quot;&quot;</span>  <span class="hljs-comment"># docstring = 도구 설명</span>
    <span class="hljs-keyword">return</span> web_search(query)

<span class="hljs-meta">@tool</span>
<span class="hljs-keyword">def</span> <span class="hljs-title function_">calculator</span>(<span class="hljs-params">expression: <span class="hljs-built_in">str</span></span>) -&gt; <span class="hljs-built_in">str</span>:
    <span class="hljs-string">&quot;&quot;&quot;수식을 계산한다. 예: &#x27;2 * (3 + 4)&#x27;.&quot;&quot;&quot;</span>
    <span class="hljs-keyword">return</span> <span class="hljs-built_in">str</span>(<span class="hljs-built_in">eval</span>(expression))

<span class="hljs-comment"># 모델에 도구를 &quot;바인딩&quot; — 모델이 호출 여부/인자를 결정</span>
llm_with_tools = llm.bind_tools([search, calculator])
</code></pre>
<blockquote>
<p>docstring과 타입 힌트가 곧 <strong>모델이 읽는 명세</strong>입니다. 또렷하게 쓰세요.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 04 · The ReAct loop" data-theme="blueprint" lang="en-US" data-marpit-pagination="28" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 04 · The ReAct loop;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 04 · The ReAct loop</header>

<h2 id="react--%EC%83%9D%EA%B0%81%ED%95%98%EA%B3%A0-%EB%8F%84%EA%B5%AC-%EC%93%B0%EA%B3%A0-%EB%B0%98%EB%B3%B5">ReAct — 생각하고, 도구 쓰고, 반복</h2>
<div class="mermaid">
flowchart TD
  S([START]) --&gt; AG["agent · LLM"]
  AG --&gt;|tool_calls 있음| TN[ToolNode]
  TN --&gt; AG
  AG --&gt;|tool_calls 없음| E([END])
</div>
<ul>
<li>모델이 <strong>도구를 호출</strong>하면 → 도구 실행 → 결과를 다시 모델에게</li>
<li>더 호출할 게 없으면 → 최종 답변 후 종료</li>
<li>이 순환이 <strong>에이전트</strong>의 본질 — LangGraph의 cycle로 자연스럽게 표현</li>
</ul>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 04 · ToolNode" data-theme="blueprint" lang="en-US" data-marpit-pagination="29" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 04 · ToolNode;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 04 · ToolNode</header>

<h2 id="toolnode--tools_condition">ToolNode · tools_condition</h2>
<p>LangGraph 내장 부품으로 ReAct 루프를 손쉽게 조립한다.</p>
<pre><code class="language-python"><span class="hljs-keyword">from</span> langgraph.prebuilt <span class="hljs-keyword">import</span> ToolNode, tools_condition

<span class="hljs-keyword">def</span> <span class="hljs-title function_">agent</span>(<span class="hljs-params">state: MessagesState</span>):
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;messages&quot;</span>: [llm_with_tools.invoke(state[<span class="hljs-string">&quot;messages&quot;</span>])]}

builder.add_node(<span class="hljs-string">&quot;agent&quot;</span>, agent)
builder.add_node(<span class="hljs-string">&quot;tools&quot;</span>, ToolNode([search, calculator]))  <span class="hljs-comment"># 도구 실행 노드</span>

builder.add_edge(START, <span class="hljs-string">&quot;agent&quot;</span>)
<span class="hljs-comment"># tools_condition: tool_calls 있으면 &quot;tools&quot;, 없으면 END 로 라우팅</span>
builder.add_conditional_edges(<span class="hljs-string">&quot;agent&quot;</span>, tools_condition)
builder.add_edge(<span class="hljs-string">&quot;tools&quot;</span>, <span class="hljs-string">&quot;agent&quot;</span>)     <span class="hljs-comment"># 도구 결과를 다시 모델로</span>

graph = builder.<span class="hljs-built_in">compile</span>()
</code></pre>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 04 · Prebuilt" data-theme="blueprint" lang="en-US" data-marpit-pagination="30" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 04 · Prebuilt;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 04 · Prebuilt</header>

<h2 id="create_react_agent--%ED%95%9C-%EC%A4%84-%EC%97%90%EC%9D%B4%EC%A0%84%ED%8A%B8">create_react_agent — 한 줄 에이전트</h2>
<pre><code class="language-python"><span class="hljs-keyword">from</span> langgraph.prebuilt <span class="hljs-keyword">import</span> create_react_agent

agent = create_react_agent(
    model=llm,
    tools=[search, calculator],
    prompt=<span class="hljs-string">&quot;너는 꼼꼼한 리서치 어시스턴트다.&quot;</span>,
)

agent.invoke({<span class="hljs-string">&quot;messages&quot;</span>: [(<span class="hljs-string">&quot;user&quot;</span>, <span class="hljs-string">&quot;오늘 서울 날씨와 그 두 배 온도는?&quot;</span>)]})
</code></pre>
<blockquote>
<p><strong>v1 참고</strong>: 앞으로는 <code>from langchain.agents import create_agent</code> 가 권장됩니다. 인터페이스는 거의 동일하니, 직접 조립(<code>ToolNode</code>)을 이해한 뒤 prebuilt로 넘어가세요.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 04 · Lab" data-theme="blueprint" lang="en-US" data-marpit-pagination="31" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 04 · Lab;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 04 · Lab</header>

<h2 id="span-classlab%EC%8B%A4%EC%8A%B5-04span-%EB%8F%84%EA%B5%AC-%EC%93%B0%EB%8A%94-%EC%97%90%EC%9D%B4%EC%A0%84%ED%8A%B8"><span class="lab">실습 04</span> 도구 쓰는 에이전트</h2>
<div class="cols">
<div>
<pre><code class="language-python"><span class="hljs-keyword">from</span> langgraph.prebuilt <span class="hljs-keyword">import</span> (
    ToolNode, tools_condition)

tools = [search, calculator]
llm_t = llm.bind_tools(tools)

<span class="hljs-keyword">def</span> <span class="hljs-title function_">agent</span>(<span class="hljs-params">state: MessagesState</span>):
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;messages&quot;</span>:[llm_t.invoke(state[<span class="hljs-string">&quot;messages&quot;</span>])]}
</code></pre>
</div>
<div>
<pre><code class="language-python">g = StateGraph(MessagesState)
g.add_node(<span class="hljs-string">&quot;agent&quot;</span>, agent)
g.add_node(<span class="hljs-string">&quot;tools&quot;</span>, ToolNode(tools))
g.add_edge(START, <span class="hljs-string">&quot;agent&quot;</span>)
g.add_conditional_edges(<span class="hljs-string">&quot;agent&quot;</span>, tools_condition)
g.add_edge(<span class="hljs-string">&quot;tools&quot;</span>, <span class="hljs-string">&quot;agent&quot;</span>)
graph = g.<span class="hljs-built_in">compile</span>()
</code></pre>
<blockquote>
<p>도구를 직접 만든 버전과 <code>create_react_agent</code> 버전의 출력을 비교해 보세요.</p>
</blockquote>
</div>
</div>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>

<h1 id="%EC%98%81%EC%86%8D%EC%84%B1%EA%B3%BC-%EB%A9%94%EB%AA%A8%EB%A6%AC">영속성과 메모리</h1>
<div class="modsub">Checkpointer · thread_id · Store</div>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 05 · Checkpointer" data-theme="blueprint" lang="en-US" data-marpit-pagination="33" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 05 · Checkpointer;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 05 · Checkpointer</header>

<h2 id="checkpointer--%EC%83%81%ED%83%9C%EB%A5%BC-%EC%A0%80%EC%9E%A5%ED%95%9C%EB%8B%A4">Checkpointer — 상태를 저장한다</h2>
<ul>
<li>그래프 실행의 <strong>매 단계 상태</strong>를 자동 저장하는 장치</li>
<li><code>thread_id</code>로 구분된 <strong>대화 스레드</strong>별로 상태가 쌓임</li>
<li>효과: <strong>대화 기억</strong> · 중단 후 재개 · 과거로 되감기(time travel) · Human-in-the-loop</li>
</ul>
<pre><code class="language-python"><span class="hljs-keyword">from</span> langgraph.checkpoint.memory <span class="hljs-keyword">import</span> MemorySaver

checkpointer = MemorySaver()                       <span class="hljs-comment"># 인메모리(개발용)</span>
graph = builder.<span class="hljs-built_in">compile</span>(checkpointer=checkpointer) <span class="hljs-comment"># 컴파일 시 연결</span>
</code></pre>
<blockquote>
<p><code>interrupt</code>(모듈 06)도 checkpointer가 있어야 동작합니다 — 상태를 저장해 둬야 재개가 가능하니까요.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 05 · Memory in action" data-theme="blueprint" lang="en-US" data-marpit-pagination="34" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 05 · Memory in action;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 05 · Memory in action</header>

<h2 id="thread_id--%EB%8C%80%ED%99%94%EB%A5%BC-%EA%B8%B0%EC%96%B5%ED%95%98%EB%8B%A4">thread_id — 대화를 기억하다</h2>
<pre><code class="language-python">config = {<span class="hljs-string">&quot;configurable&quot;</span>: {<span class="hljs-string">&quot;thread_id&quot;</span>: <span class="hljs-string">&quot;user-42&quot;</span>}}

graph.invoke({<span class="hljs-string">&quot;messages&quot;</span>: [(<span class="hljs-string">&quot;user&quot;</span>, <span class="hljs-string">&quot;내 이름은 지호야&quot;</span>)]}, config)
graph.invoke({<span class="hljs-string">&quot;messages&quot;</span>: [(<span class="hljs-string">&quot;user&quot;</span>, <span class="hljs-string">&quot;내 이름이 뭐였지?&quot;</span>)]}, config)
<span class="hljs-comment"># → &quot;지호&quot; 라고 답한다. 같은 thread_id 의 이전 상태를 이어받기 때문</span>
</code></pre>
<ul>
<li>같은 <code>thread_id</code> → 이전 메시지가 State에 그대로 남아 있음</li>
<li>다른 <code>thread_id</code> → 완전히 새 대화 (격리됨)</li>
</ul>
<blockquote>
<p>멀티 유저 서비스라면 보통 <code>thread_id = 사용자/세션 ID</code>.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 05 · Production stores" data-theme="blueprint" lang="en-US" data-marpit-pagination="35" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 05 · Production stores;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 05 · Production stores</header>

<h2 id="%EC%A0%80%EC%9E%A5%EC%86%8C--%EA%B0%9C%EB%B0%9C%EC%97%90%EC%84%9C-%EC%9A%B4%EC%98%81%EC%9C%BC%EB%A1%9C">저장소 — 개발에서 운영으로</h2>
<table>
<thead>
<tr>
<th>체크포인터</th>
<th>패키지</th>
<th>용도</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>MemorySaver</code></td>
<td>langgraph</td>
<td>개발·테스트 (프로세스 종료 시 소멸)</td>
</tr>
<tr>
<td><code>SqliteSaver</code></td>
<td>langgraph-checkpoint-sqlite</td>
<td>로컬·소규모 영속</td>
</tr>
<tr>
<td><code>PostgresSaver</code></td>
<td>langgraph-checkpoint-postgres</td>
<td>운영 환경</td>
</tr>
</tbody>
</table>
<pre><code class="language-python"><span class="hljs-keyword">from</span> langgraph.checkpoint.sqlite <span class="hljs-keyword">import</span> SqliteSaver

<span class="hljs-keyword">with</span> SqliteSaver.from_conn_string(<span class="hljs-string">&quot;chat.db&quot;</span>) <span class="hljs-keyword">as</span> cp:
    graph = builder.<span class="hljs-built_in">compile</span>(checkpointer=cp)
    graph.invoke(inputs, config)
</code></pre>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 05 · Time travel" data-theme="blueprint" lang="en-US" data-marpit-pagination="36" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 05 · Time travel;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 05 · Time travel</header>

<h2 id="%EB%90%98%EA%B0%90%EA%B8%B0--%EA%B3%BC%EA%B1%B0-%EC%83%81%ED%83%9C%EC%97%90%EC%84%9C-%EB%8B%A4%EC%8B%9C">되감기 — 과거 상태에서 다시</h2>
<pre><code class="language-python"><span class="hljs-comment"># 이 스레드의 모든 체크포인트 이력</span>
history = <span class="hljs-built_in">list</span>(graph.get_state_history(config))

<span class="hljs-comment"># 특정 시점(checkpoint)부터 다시 실행 (분기)</span>
past = history[<span class="hljs-number">2</span>]
graph.invoke(<span class="hljs-literal">None</span>, past.config)

<span class="hljs-comment"># 현재 상태 들여다보기 / 직접 수정</span>
snapshot = graph.get_state(config)
graph.update_state(config, {<span class="hljs-string">&quot;topic&quot;</span>: <span class="hljs-string">&quot;새 주제&quot;</span>})
</code></pre>
<blockquote>
<p>디버깅·what-if 분석·HITL에서 모두 쓰이는 강력한 기능.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 05 · Long-term memory" data-theme="blueprint" lang="en-US" data-marpit-pagination="37" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 05 · Long-term memory;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 05 · Long-term memory</header>

<h2 id="store--%EC%8A%A4%EB%A0%88%EB%93%9C%EB%A5%BC-%EB%84%98%EB%8A%94-%EC%9E%A5%EA%B8%B0-%EA%B8%B0%EC%96%B5">Store — 스레드를 넘는 장기 기억</h2>
<p><code>Checkpointer</code>가 <strong>한 대화의 상태</strong>라면, <code>Store</code>는 <strong>대화를 넘어</strong> 사용자 선호·사실을 기억한다.</p>
<pre><code class="language-python"><span class="hljs-keyword">from</span> langgraph.store.memory <span class="hljs-keyword">import</span> InMemoryStore

store = InMemoryStore()
graph = builder.<span class="hljs-built_in">compile</span>(checkpointer=checkpointer, store=store)

<span class="hljs-keyword">def</span> <span class="hljs-title function_">remember</span>(<span class="hljs-params">state, *, store</span>):   <span class="hljs-comment"># 노드에서 store 주입받기</span>
    store.put((<span class="hljs-string">&quot;user-42&quot;</span>, <span class="hljs-string">&quot;facts&quot;</span>), <span class="hljs-string">&quot;diet&quot;</span>, {<span class="hljs-string">&quot;text&quot;</span>: <span class="hljs-string">&quot;비건&quot;</span>})
    hits = store.search((<span class="hljs-string">&quot;user-42&quot;</span>, <span class="hljs-string">&quot;facts&quot;</span>), query=<span class="hljs-string">&quot;식습관&quot;</span>)
    <span class="hljs-keyword">return</span> {...}
</code></pre>
<blockquote>
<p>운영에선 <code>PostgresStore</code> + 임베딩 검색으로 &quot;기억하는 비서&quot;를 만듭니다.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 05 · Lab" data-theme="blueprint" lang="en-US" data-marpit-pagination="38" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 05 · Lab;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 05 · Lab</header>

<h2 id="span-classlab%EC%8B%A4%EC%8A%B5-05span-%EA%B8%B0%EC%96%B5%ED%95%98%EB%8A%94-%EC%B1%97%EB%B4%87"><span class="lab">실습 05</span> 기억하는 챗봇</h2>
<div class="cols">
<div>
<pre><code class="language-python"><span class="hljs-keyword">from</span> langgraph.checkpoint.memory <span class="hljs-keyword">import</span> MemorySaver

graph = builder.<span class="hljs-built_in">compile</span>(
    checkpointer=MemorySaver())

cfg = {<span class="hljs-string">&quot;configurable&quot;</span>: {<span class="hljs-string">&quot;thread_id&quot;</span>: <span class="hljs-string">&quot;demo&quot;</span>}}
</code></pre>
</div>
<div>
<pre><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">chat</span>(<span class="hljs-params">text</span>):
    out = graph.invoke(
        {<span class="hljs-string">&quot;messages&quot;</span>: [(<span class="hljs-string">&quot;user&quot;</span>, text)]}, cfg)
    <span class="hljs-built_in">print</span>(out[<span class="hljs-string">&quot;messages&quot;</span>][-<span class="hljs-number">1</span>].content)

chat(<span class="hljs-string">&quot;내 취미는 등산이야&quot;</span>)
chat(<span class="hljs-string">&quot;내 취미에 맞는 책 추천해줘&quot;</span>)  <span class="hljs-comment"># 등산 기억함</span>
</code></pre>
<blockquote>
<p><code>thread_id</code>를 바꿔 호출하면 기억이 사라지는 걸 확인해 보세요.</p>
</blockquote>
</div>
</div>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-footer="LangGraph 풀코스 · v1.x" data-class="section" data-theme="blueprint" lang="en-US" class="section" style="--footer:LangGraph 풀코스 · v1.x;--class:section;--theme:blueprint;"><div class="modnum">MODULE 06</div>
<h1 id="human-in-the-loop">Human-in-the-loop</h1>
<div class="modsub">interrupt · 승인 게이트 · resume</div>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 06 · The pattern" data-theme="blueprint" lang="en-US" data-marpit-pagination="40" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 06 · The pattern;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 06 · The pattern</header>

<h2 id="%EC%82%AC%EB%9E%8C%EC%9D%84-%ED%9D%90%EB%A6%84-%EC%95%88%EC%97%90-%EB%84%A3%EA%B8%B0">사람을 흐름 안에 넣기</h2>
<div class="mermaid">
flowchart LR
  P[plan] --&gt; H{{"human · interrupt"}}
  H --&gt;|resume: yes| X[execute] --&gt; E([END])
  H --&gt;|resume: edit| P
</div>
<ul>
<li>민감한 행동(결제·삭제·발송) <strong>직전에 멈추고</strong> 사람의 승인을 받는다</li>
<li><code>interrupt()</code>로 그래프를 <strong>일시정지</strong> → 사람이 결정 → <code>Command(resume=...)</code>로 재개</li>
<li>상태가 checkpointer에 저장돼 있으니, 몇 분/며칠 뒤 재개해도 OK</li>
</ul>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 06 · interrupt" data-theme="blueprint" lang="en-US" data-marpit-pagination="41" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 06 · interrupt;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 06 · interrupt</header>

<h2 id="interrupt--%EB%A9%88%EC%B6%94%EA%B3%A0-%EB%AC%BC%EC%96%B4%EB%B3%B8%EB%8B%A4">interrupt() — 멈추고 물어본다</h2>
<pre><code class="language-python"><span class="hljs-keyword">from</span> langgraph.types <span class="hljs-keyword">import</span> interrupt, Command

<span class="hljs-keyword">def</span> <span class="hljs-title function_">approval</span>(<span class="hljs-params">state: State</span>):
    <span class="hljs-comment"># 실행이 여기서 멈추고, payload 가 클라이언트로 전달된다</span>
    decision = interrupt({
        <span class="hljs-string">&quot;action&quot;</span>: state[<span class="hljs-string">&quot;next_action&quot;</span>],
        <span class="hljs-string">&quot;question&quot;</span>: <span class="hljs-string">&quot;이 작업을 승인하시겠습니까? (yes/no)&quot;</span>,
    })
    <span class="hljs-comment"># 재개되면 decision 에 resume 값이 들어온다</span>
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;approved&quot;</span>: decision == <span class="hljs-string">&quot;yes&quot;</span>}
</code></pre>
<ul>
<li><code>interrupt(payload)</code> — payload는 사람에게 보여줄 정보</li>
<li><strong>checkpointer 필수</strong> (멈춘 상태를 저장해야 하므로)</li>
</ul>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 06 · Resume" data-theme="blueprint" lang="en-US" data-marpit-pagination="42" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 06 · Resume;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 06 · Resume</header>

<h2 id="%EC%9E%AC%EA%B0%9C--commandresume">재개 — Command(resume=...)</h2>
<pre><code class="language-python">config = {<span class="hljs-string">&quot;configurable&quot;</span>: {<span class="hljs-string">&quot;thread_id&quot;</span>: <span class="hljs-string">&quot;t1&quot;</span>}}

<span class="hljs-comment"># 1) 첫 실행 — approval 노드의 interrupt 에서 멈춤</span>
graph.invoke({<span class="hljs-string">&quot;messages&quot;</span>: [(<span class="hljs-string">&quot;user&quot;</span>, <span class="hljs-string">&quot;100만원 송금해줘&quot;</span>)]}, config)

<span class="hljs-comment"># 2) 사람의 결정을 확인한다</span>
state = graph.get_state(config)
<span class="hljs-built_in">print</span>(state.<span class="hljs-built_in">next</span>)                 <span class="hljs-comment"># (&#x27;approval&#x27;,) — 멈춰 있는 위치</span>

<span class="hljs-comment"># 3) 결정을 주입하며 재개</span>
graph.invoke(Command(resume=<span class="hljs-string">&quot;yes&quot;</span>), config)
</code></pre>
<blockquote>
<p><code>update_state</code>로 상태를 <strong>고친 뒤</strong> 재개할 수도 있습니다 — &quot;승인 + 금액 수정&quot; 같은 패턴.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 06 · Lab" data-theme="blueprint" lang="en-US" data-marpit-pagination="43" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 06 · Lab;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 06 · Lab</header>

<h2 id="span-classlab%EC%8B%A4%EC%8A%B5-06span-%EC%8A%B9%EC%9D%B8-%EA%B2%8C%EC%9D%B4%ED%8A%B8"><span class="lab">실습 06</span> 승인 게이트</h2>
<div class="cols">
<div>
<pre><code class="language-python"><span class="hljs-keyword">from</span> langgraph.types <span class="hljs-keyword">import</span> interrupt, Command

<span class="hljs-keyword">def</span> <span class="hljs-title function_">plan</span>(<span class="hljs-params">state</span>):
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;next_action&quot;</span>: <span class="hljs-string">&quot;send_email&quot;</span>}

<span class="hljs-keyword">def</span> <span class="hljs-title function_">gate</span>(<span class="hljs-params">state</span>):
    ok = interrupt({<span class="hljs-string">&quot;action&quot;</span>: state[<span class="hljs-string">&quot;next_action&quot;</span>]})
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;approved&quot;</span>: ok == <span class="hljs-string">&quot;yes&quot;</span>}

<span class="hljs-keyword">def</span> <span class="hljs-title function_">execute</span>(<span class="hljs-params">state</span>):
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;messages&quot;</span>:[(<span class="hljs-string">&quot;ai&quot;</span>,<span class="hljs-string">&quot;실행 완료&quot;</span>)]}
</code></pre>
</div>
<div>
<pre><code class="language-python">g.add_edge(START, <span class="hljs-string">&quot;plan&quot;</span>)
g.add_edge(<span class="hljs-string">&quot;plan&quot;</span>, <span class="hljs-string">&quot;gate&quot;</span>)
g.add_edge(<span class="hljs-string">&quot;gate&quot;</span>, <span class="hljs-string">&quot;execute&quot;</span>)
g.add_edge(<span class="hljs-string">&quot;execute&quot;</span>, END)
graph = g.<span class="hljs-built_in">compile</span>(checkpointer=MemorySaver())

graph.invoke(inputs, cfg)          <span class="hljs-comment"># gate 에서 멈춤</span>
graph.invoke(Command(resume=<span class="hljs-string">&quot;yes&quot;</span>), cfg)  <span class="hljs-comment"># 재개</span>
</code></pre>
</div>
</div>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-footer="LangGraph 풀코스 · v1.x" data-class="section" data-theme="blueprint" lang="en-US" class="section" style="--footer:LangGraph 풀코스 · v1.x;--class:section;--theme:blueprint;"><div class="modnum">MODULE 07</div>
<h1 id="rag-with-langgraph">RAG with LangGraph</h1>
<div class="modsub">retrieve · grade · generate · self-correct</div>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 07 · RAG as a graph" data-theme="blueprint" lang="en-US" data-marpit-pagination="45" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 07 · RAG as a graph;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 07 · RAG as a graph</header>

<h2 id="rag-%ED%8C%8C%EC%9D%B4%ED%94%84%EB%9D%BC%EC%9D%B8%EC%9D%84-%EA%B7%B8%EB%9E%98%ED%94%84%EB%A1%9C">RAG 파이프라인을 그래프로</h2>
<div class="mermaid">
flowchart LR
  Q([질문]) --&gt; R[retrieve]
  R --&gt; G{관련성 평가}
  G --&gt;|관련 있음| GEN[generate]
  G --&gt;|관련 없음| RW[rewrite]
  RW --&gt; R
  GEN --&gt; A([답변])
</div>
<ul>
<li>단순 RAG = retrieve → generate (직선)</li>
<li><strong>Corrective RAG</strong> = 검색 결과를 <strong>평가</strong>하고, 부실하면 질문을 고쳐 <strong>다시 검색</strong></li>
<li>조건부 엣지 + 사이클 = LangGraph가 RAG에 잘 맞는 이유</li>
</ul>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 07 · Nodes" data-theme="blueprint" lang="en-US" data-marpit-pagination="46" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 07 · Nodes;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 07 · Nodes</header>

<h2 id="%EB%85%B8%EB%93%9C-retrieve--grade--generate">노드: retrieve · grade · generate</h2>
<pre><code class="language-python"><span class="hljs-keyword">class</span> <span class="hljs-title class_">RAGState</span>(<span class="hljs-title class_ inherited__">TypedDict</span>):
    question: <span class="hljs-built_in">str</span>
    documents: <span class="hljs-built_in">list</span>
    answer: <span class="hljs-built_in">str</span>

<span class="hljs-keyword">def</span> <span class="hljs-title function_">retrieve</span>(<span class="hljs-params">state: RAGState</span>):
    docs = retriever.invoke(state[<span class="hljs-string">&quot;question&quot;</span>])      <span class="hljs-comment"># 벡터 검색</span>
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;documents&quot;</span>: docs}

<span class="hljs-keyword">def</span> <span class="hljs-title function_">generate</span>(<span class="hljs-params">state: RAGState</span>):
    ctx = <span class="hljs-string">&quot;\n\n&quot;</span>.join(d.page_content <span class="hljs-keyword">for</span> d <span class="hljs-keyword">in</span> state[<span class="hljs-string">&quot;documents&quot;</span>])
    ans = llm.invoke(<span class="hljs-string">f&quot;문맥:\n<span class="hljs-subst">{ctx}</span>\n\n질문: <span class="hljs-subst">{state[<span class="hljs-string">&#x27;question&#x27;</span>]}</span>&quot;</span>)
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;answer&quot;</span>: ans.content}
</code></pre>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 07 · Self-correction" data-theme="blueprint" lang="en-US" data-marpit-pagination="47" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 07 · Self-correction;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 07 · Self-correction</header>

<h2 id="%EC%9E%90%EA%B8%B0%EA%B5%90%EC%A0%95--grade--rewrite">자기교정 — grade &amp; rewrite</h2>
<pre><code class="language-python"><span class="hljs-keyword">from</span> typing <span class="hljs-keyword">import</span> <span class="hljs-type">Literal</span>

<span class="hljs-keyword">def</span> <span class="hljs-title function_">grade</span>(<span class="hljs-params">state: RAGState</span>) -&gt; <span class="hljs-type">Literal</span>[<span class="hljs-string">&quot;generate&quot;</span>, <span class="hljs-string">&quot;rewrite&quot;</span>]:
    ctx = format_docs(state[<span class="hljs-string">&quot;documents&quot;</span>])
    verdict = llm.invoke(
        <span class="hljs-string">f&quot;문서가 질문에 답하기 충분한가? yes/no\n질문:<span class="hljs-subst">{state[<span class="hljs-string">&#x27;question&#x27;</span>]}</span>\n<span class="hljs-subst">{ctx}</span>&quot;</span>
    ).content
    <span class="hljs-keyword">return</span> <span class="hljs-string">&quot;generate&quot;</span> <span class="hljs-keyword">if</span> <span class="hljs-string">&quot;yes&quot;</span> <span class="hljs-keyword">in</span> verdict.lower() <span class="hljs-keyword">else</span> <span class="hljs-string">&quot;rewrite&quot;</span>

<span class="hljs-keyword">def</span> <span class="hljs-title function_">rewrite</span>(<span class="hljs-params">state: RAGState</span>):
    better = llm.invoke(<span class="hljs-string">f&quot;검색이 잘 되도록 질문을 다시 써라: <span class="hljs-subst">{state[<span class="hljs-string">&#x27;question&#x27;</span>]}</span>&quot;</span>)
    <span class="hljs-keyword">return</span> {<span class="hljs-string">&quot;question&quot;</span>: better.content}

builder.add_conditional_edges(<span class="hljs-string">&quot;retrieve&quot;</span>, grade)
builder.add_edge(<span class="hljs-string">&quot;rewrite&quot;</span>, <span class="hljs-string">&quot;retrieve&quot;</span>)   <span class="hljs-comment"># 고친 질문으로 재검색</span>
</code></pre>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 07 · Lab" data-theme="blueprint" lang="en-US" data-marpit-pagination="48" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 07 · Lab;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 07 · Lab</header>

<h2 id="span-classlab%EC%8B%A4%EC%8A%B5-07span-%EB%AC%B8%EC%84%9C-qa-%EA%B7%B8%EB%9E%98%ED%94%84"><span class="lab">실습 07</span> 문서 QA 그래프</h2>
<div class="cols">
<div>
<pre><code class="language-python">g = StateGraph(RAGState)
g.add_node(<span class="hljs-string">&quot;retrieve&quot;</span>, retrieve)
g.add_node(<span class="hljs-string">&quot;rewrite&quot;</span>, rewrite)
g.add_node(<span class="hljs-string">&quot;generate&quot;</span>, generate)

g.add_edge(START, <span class="hljs-string">&quot;retrieve&quot;</span>)
g.add_conditional_edges(<span class="hljs-string">&quot;retrieve&quot;</span>, grade)
g.add_edge(<span class="hljs-string">&quot;rewrite&quot;</span>, <span class="hljs-string">&quot;retrieve&quot;</span>)
g.add_edge(<span class="hljs-string">&quot;generate&quot;</span>, END)
rag = g.<span class="hljs-built_in">compile</span>()
</code></pre>
</div>
<div>
<h4 id="%ED%99%95%EC%9E%A5-%EA%B3%BC%EC%A0%9C">확장 과제</h4>
<ul>
<li><code>rewrite</code> 횟수 상한 (모듈 03의 루프 방어)</li>
<li>생성 답변의 <strong>환각 검사</strong> 노드 추가 → 실패 시 재생성</li>
<li><code>retriever</code>를 실제 벡터스토어(FAISS·Chroma)로 교체</li>
</ul>
<blockquote>
<p>평가·재시도 노드를 더할수록 &quot;Self-RAG&quot;에 가까워집니다.</p>
</blockquote>
</div>
</div>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-footer="LangGraph 풀코스 · v1.x" data-class="section" data-theme="blueprint" lang="en-US" class="section" style="--footer:LangGraph 풀코스 · v1.x;--class:section;--theme:blueprint;"><div class="modnum">MODULE 08</div>
<h1 id="%EB%A9%80%ED%8B%B0-%EC%97%90%EC%9D%B4%EC%A0%84%ED%8A%B8">멀티 에이전트</h1>
