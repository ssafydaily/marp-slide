</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 08 · When" data-theme="blueprint" lang="en-US" data-marpit-pagination="50" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 08 · When;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 08 · When</header>

<h2 id="%EC%96%B8%EC%A0%9C-%EC%97%AC%EB%9F%AC-%EC%97%90%EC%9D%B4%EC%A0%84%ED%8A%B8%EB%A1%9C-%EB%82%98%EB%88%8C%EA%B9%8C">언제 여러 에이전트로 나눌까</h2>
<ul>
<li>한 에이전트의 <strong>도구·프롬프트가 너무 비대</strong>해질 때</li>
<li>역할이 뚜렷이 갈릴 때 (리서치 / 코딩 / 작문)</li>
<li>도메인별 <strong>전문화</strong>가 품질을 높일 때</li>
</ul>
<table>
<thead>
<tr>
<th>패턴</th>
<th>제어 방식</th>
<th>적합한 경우</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Supervisor</strong></td>
<td>중앙 관리자가 위임·취합</td>
<td>명확한 분업, 추적 용이</td>
</tr>
<tr>
<td><strong>Swarm</strong></td>
<td>에이전트끼리 직접 handoff</td>
<td>동적 협업, 대화 이관</td>
</tr>
<tr>
<td><strong>Network</strong></td>
<td>자유로운 상호 호출</td>
<td>복잡·비정형 (제어 어려움)</td>
</tr>
</tbody>
</table>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 08 · Supervisor" data-theme="blueprint" lang="en-US" data-marpit-pagination="51" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 08 · Supervisor;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 08 · Supervisor</header>

<h2 id="supervisor--%EA%B4%80%EB%A6%AC%EC%9E%90%EA%B0%80-%EC%9C%84%EC%9E%84%ED%95%9C%EB%8B%A4">Supervisor — 관리자가 위임한다</h2>
<div class="mermaid">
flowchart TD
  S{{supervisor}} --&gt; R[researcher]
  S --&gt; C[coder]
  R --&gt; S
  C --&gt; S
  S --&gt; E([END])
</div>
<ul>
<li>관리자 노드가 <strong>다음에 누구를 부를지</strong> 결정하고, 결과를 받아 다시 판단</li>
<li>모듈 02의 <code>Command(goto=...)</code> 라우팅이 그대로 확장된 형태</li>
</ul>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 08 · Supervisor" data-theme="blueprint" lang="en-US" data-marpit-pagination="52" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 08 · Supervisor;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 08 · Supervisor</header>

<h2 id="langgraph-supervisor--prebuilt">langgraph-supervisor — prebuilt</h2>
<pre><code class="language-python"><span class="hljs-keyword">from</span> langgraph_supervisor <span class="hljs-keyword">import</span> create_supervisor
<span class="hljs-keyword">from</span> langgraph.prebuilt <span class="hljs-keyword">import</span> create_react_agent

researcher = create_react_agent(llm, [web_search], name=<span class="hljs-string">&quot;researcher&quot;</span>,
                                prompt=<span class="hljs-string">&quot;너는 리서치 전문가다.&quot;</span>)
coder = create_react_agent(llm, [run_python], name=<span class="hljs-string">&quot;coder&quot;</span>,
                           prompt=<span class="hljs-string">&quot;너는 파이썬 코더다.&quot;</span>)

app = create_supervisor(
    agents=[researcher, coder],
    model=llm,
    prompt=<span class="hljs-string">&quot;리서치는 researcher, 코드는 coder 에게 위임하라.&quot;</span>,
).<span class="hljs-built_in">compile</span>()

app.invoke({<span class="hljs-string">&quot;messages&quot;</span>: [(<span class="hljs-string">&quot;user&quot;</span>, <span class="hljs-string">&quot;최근 환율을 찾아 그래프 그리는 코드를 써줘&quot;</span>)]})
</code></pre>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 08 · Swarm" data-theme="blueprint" lang="en-US" data-marpit-pagination="53" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 08 · Swarm;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 08 · Swarm</header>

<h2 id="swarm--%EC%97%90%EC%9D%B4%EC%A0%84%ED%8A%B8%EB%81%BC%EB%A6%AC-%EB%84%98%EA%B8%B4%EB%8B%A4">Swarm — 에이전트끼리 넘긴다</h2>
<div class="mermaid">
flowchart LR
  A[flight_agent] <-->|handoff| B[hotel_agent]
  A <-->|handoff| C[refund_agent]
  B <-->|handoff| C
</div>
<pre><code class="language-python"><span class="hljs-keyword">from</span> langgraph_swarm <span class="hljs-keyword">import</span> create_swarm, create_handoff_tool

flight = create_react_agent(llm, [book_flight,
    create_handoff_tool(agent_name=<span class="hljs-string">&quot;hotel&quot;</span>)], name=<span class="hljs-string">&quot;flight&quot;</span>)
hotel  = create_react_agent(llm, [book_hotel,
    create_handoff_tool(agent_name=<span class="hljs-string">&quot;flight&quot;</span>)], name=<span class="hljs-string">&quot;hotel&quot;</span>)

app = create_swarm([flight, hotel], default_active_agent=<span class="hljs-string">&quot;flight&quot;</span>).<span class="hljs-built_in">compile</span>()
</code></pre>
<blockquote>
<p>중앙 관리자 없이, <strong>현재 활성 에이전트</strong>가 필요할 때 동료에게 제어를 넘깁니다.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 08 · Subgraph" data-theme="blueprint" lang="en-US" data-marpit-pagination="54" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 08 · Subgraph;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 08 · Subgraph</header>

<h2 id="subgraph--%EA%B7%B8%EB%9E%98%ED%94%84%EB%A5%BC-%EB%B6%80%ED%92%88%EC%9C%BC%EB%A1%9C">Subgraph — 그래프를 부품으로</h2>
<pre><code class="language-python"><span class="hljs-comment"># 1) 작은 그래프를 컴파일</span>
sub = sub_builder.<span class="hljs-built_in">compile</span>()

<span class="hljs-comment"># 2) 부모 그래프의 &quot;노드&quot;로 그대로 끼운다</span>
parent.add_node(<span class="hljs-string">&quot;research_team&quot;</span>, sub)
parent.add_edge(START, <span class="hljs-string">&quot;research_team&quot;</span>)
</code></pre>
<div class="mermaid">
flowchart LR
  P1[intake] --&gt; SUB[["research_team (subgraph)"]] --&gt; P2[report]
</div>
<ul>
<li>복잡한 시스템을 <strong>모듈 단위</strong>로 쪼개 재사용·테스트</li>
<li>부모와 자식이 State를 공유하거나, 입출력만 변환해 연결</li>
</ul>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 08 · Lab" data-theme="blueprint" lang="en-US" data-marpit-pagination="55" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 08 · Lab;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 08 · Lab</header>

<h2 id="span-classlab%EC%8B%A4%EC%8A%B5-08span-%EB%A6%AC%EC%84%9C%EC%B9%98-%ED%98%91%EC%97%85-%EC%8B%9C%EC%8A%A4%ED%85%9C"><span class="lab">실습 08</span> 리서치 협업 시스템</h2>
<div class="cols">
<div>
<pre><code class="language-python">researcher = create_react_agent(
    llm, [web_search], name=<span class="hljs-string">&quot;researcher&quot;</span>,
    prompt=<span class="hljs-string">&quot;사실을 수집하고 출처를 남겨라.&quot;</span>)

writer = create_react_agent(
    llm, [], name=<span class="hljs-string">&quot;writer&quot;</span>,
    prompt=<span class="hljs-string">&quot;수집된 내용을 보고서로 정리하라.&quot;</span>)

team = create_supervisor(
    agents=[researcher, writer], model=llm,
    prompt=<span class="hljs-string">&quot;먼저 researcher, 그다음 writer.&quot;</span>,
).<span class="hljs-built_in">compile</span>()
</code></pre>
</div>
<div>
<h4 id="%ED%95%B4%EB%B3%B4%EA%B8%B0-1">해보기</h4>
<ol>
<li><code>team.stream(..., stream_mode=&quot;updates&quot;)</code> 로 누가 말하는지 추적</li>
<li><code>writer</code>에게 도구를 빼고 <strong>취합만</strong> 시키기</li>
<li>Supervisor 버전을 <strong>Swarm</strong>으로 바꿔 차이 체감</li>
</ol>
<blockquote>
<p>모듈 09의 스트리밍으로 멀티에이전트의 내부 대화를 들여다봅니다.</p>
</blockquote>
</div>
</div>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-footer="LangGraph 풀코스 · v1.x" data-class="section" data-theme="blueprint" lang="en-US" class="section" style="--footer:LangGraph 풀코스 · v1.x;--class:section;--theme:blueprint;"><div class="modnum">MODULE 09</div>
<h1 id="%EC%9A%B4%EC%98%81--%EC%8A%A4%ED%8A%B8%EB%A6%AC%EB%B0%8D--%EB%A7%88%EB%AC%B4%EB%A6%AC">운영 · 스트리밍 · 마무리</h1>
<div class="modsub">stream_mode · 디버깅 · 배포</div>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 09 · Streaming" data-theme="blueprint" lang="en-US" data-marpit-pagination="57" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 09 · Streaming;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 09 · Streaming</header>

<h2 id="%EC%8A%A4%ED%8A%B8%EB%A6%AC%EB%B0%8D--stream_mode">스트리밍 — stream_mode</h2>
<pre><code class="language-python"><span class="hljs-keyword">for</span> chunk <span class="hljs-keyword">in</span> graph.stream(inputs, config, stream_mode=<span class="hljs-string">&quot;updates&quot;</span>):
    <span class="hljs-built_in">print</span>(chunk)   <span class="hljs-comment"># {노드이름: 그 노드가 반환한 갱신분}</span>
</code></pre>
<table>
<thead>
<tr>
<th>mode</th>
<th>무엇이 흘러오나</th>
<th>쓰임</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>values</code></td>
<td>매 단계 <strong>전체 State</strong></td>
<td>최종/누적 상태 표시</td>
</tr>
<tr>
<td><code>updates</code></td>
<td>노드별 <strong>갱신분</strong></td>
<td>진행 상황·디버깅</td>
</tr>
<tr>
<td><code>messages</code></td>
<td>LLM <strong>토큰 단위</strong></td>
<td>챗 UI 타이핑 효과</td>
</tr>
<tr>
<td><code>debug</code></td>
<td>상세 이벤트</td>
<td>심층 디버깅</td>
</tr>
</tbody>
</table>
<blockquote>
<p>리스트로 여러 모드를 동시에: <code>stream_mode=[&quot;updates&quot;, &quot;messages&quot;]</code>.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 09 · Debugging" data-theme="blueprint" lang="en-US" data-marpit-pagination="58" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 09 · Debugging;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 09 · Debugging</header>

<h2 id="%EB%94%94%EB%B2%84%EA%B9%85--%EA%B7%B8%EB%9E%98%ED%94%84%EB%A5%BC-%EB%93%A4%EC%97%AC%EB%8B%A4%EB%B3%B4%EA%B8%B0">디버깅 — 그래프를 들여다보기</h2>
<div class="cols">
<div>
<h4 id="%EA%B5%AC%EC%A1%B0-%EC%8B%9C%EA%B0%81%ED%99%94">구조 시각화</h4>
<pre><code class="language-python"><span class="hljs-comment"># Mermaid 텍스트로</span>
<span class="hljs-built_in">print</span>(graph.get_graph().draw_mermaid())

<span class="hljs-comment"># PNG 로</span>
graph.get_graph().draw_mermaid_png()
</code></pre>
</div>
<div>
<h4 id="%EC%B6%94%EC%A0%81--%EC%8A%A4%ED%8A%9C%EB%94%94%EC%98%A4">추적 · 스튜디오</h4>
<ul>
<li><strong>LangSmith</strong> — 모든 실행/토큰/지연을 추적 (<code>LANGSMITH_TRACING=true</code>)</li>
<li><strong>LangGraph Studio</strong> — 그래프를 시각적으로 실행·중단·되감기</li>
</ul>
<pre><code class="language-bash">pip install -U <span class="hljs-string">&quot;langgraph-cli[inmem]&quot;</span>
langgraph dev   <span class="hljs-comment"># 로컬 스튜디오 실행</span>
</code></pre>
</div>
</div>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Module 09 · Deploy" data-theme="blueprint" lang="en-US" data-marpit-pagination="59" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Module 09 · Deploy;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Module 09 · Deploy</header>

<h2 id="%EB%B0%B0%ED%8F%AC--%EA%B7%B8%EB%9E%98%ED%94%84%EB%A5%BC-%EC%84%9C%EB%B9%84%EC%8A%A4%EB%A1%9C">배포 — 그래프를 서비스로</h2>
<pre><code class="language-python"><span class="hljs-comment"># langgraph.json 으로 그래프를 선언</span>
{
  <span class="hljs-string">&quot;dependencies&quot;</span>: [<span class="hljs-string">&quot;.&quot;</span>],
  <span class="hljs-string">&quot;graphs&quot;</span>: { <span class="hljs-string">&quot;agent&quot;</span>: <span class="hljs-string">&quot;./app.py:graph&quot;</span> }
}
</code></pre>
<ul>
<li><code>langgraph dev</code> — 로컬 개발 서버 (API + 스튜디오)</li>
<li><strong>LangGraph Platform</strong> — 영속성·스케일링·스케줄링 포함 매니지드 배포</li>
<li>직접 배포 시: 컴파일된 그래프는 <strong>Runnable</strong> → FastAPI 등에 그대로 탑재</li>
</ul>
<blockquote>
<p>핵심은 같습니다 — <strong>상태 + 노드 + 엣지</strong>. 배포는 그 위의 얇은 껍데기일 뿐.</p>
</blockquote>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="60" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Recap" data-theme="blueprint" lang="en-US" data-marpit-pagination="60" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Recap;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Recap</header>

<h2 id="%EC%A0%84%EC%B2%B4-%EA%B7%B8%EB%A6%BC-%EB%8B%A4%EC%8B%9C-%EB%B3%B4%EA%B8%B0">전체 그림 다시 보기</h2>
<div class="mermaid">
flowchart LR
  S([START]) --&gt; AG["agent (LLM + tools)"]
  AG --&gt;|도구 호출| TN[ToolNode]
  TN --&gt; AG
  AG --&gt;|승인 필요| HI{{human}}
  HI --&gt;|resume| AG
  AG --&gt;|완료| E([END])
  CP[(checkpointer)] -.기억·재개.- AG
</div>
<ul>
<li><strong>State</strong>에 흐르고 · <strong>Node</strong>가 갱신하고 · <strong>Edge</strong>가 잇고 · <strong>Cycle</strong>로 반복</li>
<li>도구·메모리·사람·여러 에이전트는 모두 이 위에 얹는 레이어</li>
</ul>
<footer>LangGraph 풀코스 · v1.x</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="61" data-paginate="true" data-footer="LangGraph 풀코스 · v1.x" data-header="Next steps" data-theme="blueprint" lang="en-US" data-marpit-pagination="61" style="--paginate:true;--footer:LangGraph 풀코스 · v1.x;--header:Next steps;--theme:blueprint;" data-marpit-pagination-total="62">
<header>Next steps</header>

<h2 id="%EB%8B%A4%EC%9D%8C-%EB%8B%A8%EA%B3%84--%EB%A6%AC%EC%86%8C%EC%8A%A4">다음 단계 &amp; 리소스</h2>
<div class="cols">
<div>
<h4 id="%EC%A7%81%EC%A0%91-%EB%A7%8C%EB%93%A4%EC%96%B4-%EB%B3%BC-%EA%B2%83">직접 만들어 볼 것</h4>
<ul>
<li>도구 3개짜리 ReAct 에이전트 + 메모리</li>
<li>Corrective RAG에 환각 검사 추가</li>
<li>Supervisor <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> Swarm 같은 과제로 비교</li>
</ul>
</div>
<div>
<h4 id="%EB%8D%94-%EB%B3%B4%EA%B8%B0">더 보기</h4>
<ul>
<li>공식 문서 · 튜토리얼 (LangGraph)</li>
<li>LangSmith로 내 에이전트 추적</li>
<li><code>langgraph-supervisor</code> · <code>langgraph-swarm</code> 레포 예제</li>
</ul>
</div>
</div>
<blockquote>
<p>막히면 그래프를 그려 보세요. <strong>흐름이 그려지면, 코드는 따라옵니다.</strong></p>
</blockquote>

</section>
