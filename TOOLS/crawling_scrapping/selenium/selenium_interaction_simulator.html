<style>
  *{box-sizing:border-box}
  .sim{font-size:13px;color:var(--color-text-primary)}
  .tab-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .tb{border:0.5px solid var(--color-border-secondary);border-radius:20px;padding:4px 13px;font-size:12px;background:var(--color-background-primary);cursor:pointer;color:var(--color-text-secondary);transition:all .15s}
  .tb.on{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
  .panel{display:flex;gap:12px;align-items:flex-start}
  .browser{flex:1;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;min-width:0}
  .brow-top{background:var(--color-background-secondary);padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:0.5px solid var(--color-border-tertiary)}
  .dots{display:flex;gap:4px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--color-border-secondary)}
  .url-bar{flex:1;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--color-text-secondary);font-family:var(--font-mono)}
  .brow-body{padding:12px;min-height:220px}
  .code-box{flex:0 0 240px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;font-family:var(--font-mono);font-size:11px;line-height:1.8;color:var(--color-text-primary)}
  .code-box .hl{background:var(--color-background-warning);border-radius:3px;padding:0 2px}
  .log{margin-top:10px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 10px;font-family:var(--font-mono);font-size:11px;min-height:36px;color:var(--color-text-success);line-height:1.7}
  .btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .act-btn{border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 12px;font-size:12px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary);transition:all .15s}
  .act-btn:hover{background:var(--color-background-secondary)}
  .act-btn:active{transform:scale(.97)}
  .mock-search{display:flex;gap:6px;margin-bottom:10px}
  .mock-input{flex:1;border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:5px 8px;font-size:12px;background:var(--color-background-primary);color:var(--color-text-primary);outline:none}
  .mock-input:focus{border-color:var(--color-border-info)}
  .mock-input.typed{border-color:var(--color-border-info);background:var(--color-background-info)}
  .mock-btn{border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;background:var(--color-background-secondary);color:var(--color-text-primary)}
  .post-item{border-bottom:0.5px solid var(--color-border-tertiary);padding:6px 0;font-size:12px;cursor:pointer;transition:background .15s;border-radius:4px;padding-left:4px}
  .post-item:hover{background:var(--color-background-secondary)}
  .post-item.clicked{background:var(--color-background-info)}
  .scroll-area{max-height:160px;overflow-y:auto;border:0.5px solid var(--color-border-tertiary);border-radius:6px;padding:4px}
  .scroll-marker{height:3px;background:var(--color-border-info);width:0;transition:width .6s;border-radius:2px;margin-bottom:6px}
  .select-el{border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:5px 8px;font-size:12px;width:100%;margin-bottom:8px;background:var(--color-background-primary);color:var(--color-text-primary)}
  .chk-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:12px}
  .iframe-mock{border:0.5px dashed var(--color-border-secondary);border-radius:6px;padding:8px;margin-top:6px;font-size:11px;color:var(--color-text-secondary)}
  .alert-mock{background:var(--color-background-warning);border:0.5px solid var(--color-border-warning);border-radius:6px;padding:8px;font-size:12px;margin-top:8px;display:none}
  .alert-mock.show{display:block}
</style>

<div class="sim">
  <div class="tab-bar">
    <button class="tb on" onclick="setTab('click')">클릭 조작</button>
    <button class="tb" onclick="setTab('input')">텍스트 입력</button>
    <button class="tb" onclick="setTab('scroll')">스크롤</button>
    <button class="tb" onclick="setTab('select')">드롭다운·체크박스</button>
    <button class="tb" onclick="setTab('frame')">팝업·iframe</button>
    <button class="tb" onclick="setTab('js')">JavaScript 실행</button>
  </div>

  <div class="panel">
    <div class="browser">
      <div class="brow-top">
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="url-bar" id="urlBar">https://finance.naver.com/item/board.naver?code=005930</div>
      </div>
      <div class="brow-body" id="browBody"></div>
    </div>
    <div class="code-box" id="codeBox"></div>
  </div>
  <div class="log" id="logBox">시뮬레이터가 준비됐습니다. 아래 버튼을 눌러 동작을 실행해보세요.</div>
  <div class="btn-row" id="btnRow"></div>
</div>

<script>
const tabs = {

    code:`from selenium.webdriver.common.by import By

el = driver.find_element(

<span class="hl">el.click()</span>

next_btn = driver.find_element(

    body:`<div style="font-size:12px;font-weight:500;margin-bottom:8px;color:var(--color-text-secondary)">삼성전자 토론방</div>
<div id="p1" class="post-item"><span style="color:var(--color-text-secondary);margin-right:8px">1024</span><a href="#" onclick="return false" style="color:var(--color-text-info)">오늘 실적 어떻게 보세요?</a><span style="float:right;color:var(--color-text-secondary)">홍길동</span></div>

<div id="p3" class="post-item"><span style="color:var(--color-text-secondary);margin-right:8px">1022</span><a href="#" onclick="return false" style="color:var(--color-text-info)">외인 수급 분석</a><span style="float:right;color:var(--color-text-secondary)">강감찬</span></div>

  input: {
    url:'https://finance.naver.com',
    code:`from selenium.webdriver.common.keys import Keys

search.clear()

    body:`<div class="mock-search">

      {label:'Keys.CONTROL+A', fn:()=>{

from selenium.webdriver.common\

  select: {

<span class="hl">sel.select_by_visible_text(

sel.select_by_index(0)
sel.select_by_value("1")

chk = driver.find_element(

  "input[type='checkbox']")
<span class="hl">chk.click()</span>
print(chk.is_selected())`,
    body:`<div style="font-size:12px;margin-bottom:6px;color:var(--color-text-secondary)">게시판 유형 선택</div>
<select class="select-el" id="mockSelect">

        document.getElementById('selectResult').textContent='select_by_visible_text("종목토론실") → value=1 선택됨';

        log('Select.select_by_index(0) → 첫 번째 옵션 선택');
      }},

        const c=document.getElementById('chk1');
        c.checked=!c.checked;

    url:'https://finance.naver.com/item/board.naver',
    code:`driver.switch_to.frame(
  "frame_main")

print(alert.text)

let cur='click';
window._logFn=null;

function log(msg){
  const lb=document.getElementById('logBox');
  lb.textContent='> '+msg;
}
window._logFn=log;

function setTab(t){
  cur=t;
  document.querySelectorAll('.tb').forEach((b,i)=>{
    b.classList.toggle('on',['click','input','scroll','select','frame','js'][i]===t);
  });
  render();
}

function render(){
  const d=tabs[cur];
  document.getElementById('urlBar').textContent=d.url;
  document.getElementById('browBody').innerHTML=d.body;
  document.getElementById('codeBox').innerHTML=d.code;
  document.getElementById('logBox').textContent='시뮬레이터 준비. 버튼을 눌러 동작을 실행하세요.';
  const br=document.getElementById('btnRow');
  br.innerHTML='';
  d.btns.forEach(b=>{
    const el=document.createElement('button');
    el.className='act-btn';
    el.textContent=b.label;
    el.onclick=b.fn;
    br.appendChild(el);
  });
}
render();
</script>
